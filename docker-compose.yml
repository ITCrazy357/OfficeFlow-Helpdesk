services:
  mysql:
    image: mysql:8.0
    container_name: officeflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: officeflow_helpdesk
      MYSQL_USER: officeflow_user
      MYSQL_PASSWORD: officeflow_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: